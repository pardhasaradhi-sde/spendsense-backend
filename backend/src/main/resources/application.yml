spring:
  application:
    name: spendsense-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  #security
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_ISSUER_URI}

  #database configuration
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  #jpa/hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL}
    properties:
      hibernate:
        format-sql: true

  #file upload configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2MB
      location: ${TEMP_UPLOAD_DIR:./temp}

    # Email via Resend HTTP API
    # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 86400000 # 24h default

  # Redis — Docker locally, Upstash in prod (set via env)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  #flyway configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Gemini AI Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-2.5-flash
    vision-model: gemini-2.5-flash
    timeout-seconds: 30
    max-retries: 3
  features:
    insights-enabled: ${AI_INSIGHTS_ENABLED:true}
    receipt-scanning-enabled: ${AI_RECEIPT_SCANNING_ENABLED:true}

# File Upload Configuration
file:
  upload:
    max-size-mb: 10
    allowed-types: image/jpeg,image/png,image/jpg,image/heic,image/webp,application/pdf

# Appwrite Storage Configuration
appwrite:
  endpoint: ${APPWRITE_ENDPOINT:https://sgp.cloud.appwrite.io/v1}
  project-id: ${APPWRITE_PROJECT_ID}
  api-key: ${APPWRITE_API_KEY}
  receipts-bucket-id: ${APPWRITE_RECEIPTS_BUCKET_ID}
  exports-bucket-id: ${APPWRITE_EXPORTS_BUCKET_ID}

clerk:
  webhook-secret: ${CLERK_WEBHOOK_SECRET}

# Scheduling Configuration
scheduling:
  enabled: ${SCHEDULING_ENABLED:true}
  recurring-transactions:
    cron: "0 0 */6 * * ?" # Every 6 hours — catches daily recurring txns even after dev restarts
  budget-alerts:
    cron: "0 0 8 * * ?" # Daily at 8 AM
  cleanup:
    cron: "0 0 3 * * SUN" # Weekly on Sunday at 3 AM

# Analytics Configuration
analytics:
  cache-duration-hours: 24
  trends-lookback-days: 90

# Export Configuration
export:
  temp-file-retention-hours: 24
  max-records-per-export: 10000

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED}
  requests-per-minute: ${RATE_LIMIT_RPM}

# Trust the X-Forwarded-For header for real client IP.
# Set to true ONLY when the app is behind a trusted reverse proxy (Nginx, Render, Railway, etc.).
# Leave false when running without a proxy to prevent IP spoofing.
app:
  trust-x-forwarded-for: ${TRUST_X_FORWARDED_FOR:false}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
  backend-url: ${APP_BACKEND_URL:http://localhost:8080}
  mail:
    from: ${MAIL_FROM:onboarding@resend.dev}

resend:
  api-key: ${RESEND_API_KEY}

#server configuration
server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging Configuration
logging:
  level:
    com.spendsense: ${LOG_LEVEL}
    org.hibernate.SQL: ${SQL_LOG_LEVEL}
    org.hibernate.type.descriptor.sql.BasicBinder: ${BINDER_LOG_LEVEL}
